name: docking
channels:
  - defaults
  - conda-forge
  - nvidia
  - bioconda
dependencies:
  # Python
  - python=3.10.18
  
  # Core scientific packages
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy  # will be installed via pip
  
  # Visualization
  - matplotlib-base=3.10.8
  - seaborn  # will be installed via pip
  
  # Chemistry and docking
  - rdkit=2025.09.3
  - openbabel=3.1.1
  - vina=1.2.6
  - mgltools=1.5.7
  
  # BioPython for protein sequences
  - biopython  # will be installed via pip
  
  # CUDA toolkit (for GPU support)
  - cuda-toolkit=12.6.2
  - cuda-command-line-tools=12.6.2
  
  # Build tools
  - cmake=4.1.3
  - gcc_linux-64=11.2.0
  - gxx_linux-64=11.2.0
  
  # System libraries
  - openssl=3.6.0
  - ca-certificates
  
  - pip
  - pip:
      # Python packages installed via pip
      - biopython==1.86
      - meeko==0.7.1
      - plotly==6.5.0
      - seaborn==0.13.2
      - scipy==1.15.3
      - pyyaml==6.0.3
      - tqdm==4.67.1
      - gemmi==0.7.3
      - requests==2.32.5
      - certifi==2025.11.12
      - urllib3==2.5.0
      - idna==3.11
      - narwhals==2.14.0



